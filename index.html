<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Tool</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    background:#111827;
    color:white;
    height:100vh;
    display:flex;
    flex-direction:column;
}

header{
    background:#1f2937;
    padding:10px;
    display:flex;
    gap:10px;
    border-bottom:2px solid #374151;
}

button{
    background:#2563eb;
    border:none;
    color:white;
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.main{
    flex:1;
    display:flex;
}

.sidebar{
    width:250px;
    background:#1f2937;
    border-right:2px solid #374151;
    padding:10px;
    overflow:auto;
}

.file{
    background:#374151;
    padding:12px;
    border-radius:8px;
    margin-bottom:10px;
    cursor:pointer;
}

.file:hover{
    background:#4b5563;
}

.editor{
    flex:1;
    display:flex;
    flex-direction:column;
}

textarea{
    flex:1;
    background:#0f172a;
    color:#00ff99;
    border:none;
    outline:none;
    padding:15px;
    font-size:15px;
}

.topbar{
    background:#1e293b;
    padding:10px;
    border-bottom:2px solid #334155;
}
</style>
</head>
<body>

<header>
    <button onclick="newFile()">📄 ملف</button>
    <button onclick="saveFile()">💾 حفظ</button>
    <button onclick="downloadFile()">⬇️ تحميل</button>
    <button onclick="deleteFile()">🗑️ حذف</button>
</header>

<div class="main">

    <div class="sidebar" id="fileList"></div>

    <div class="editor">
        <div class="topbar" id="currentName">
            لا يوجد ملف
        </div>

        <textarea id="editor"></textarea>
    </div>

</div>

<script>
let files = JSON.parse(localStorage.getItem("files")) || {};
let currentFile = null;

function saveStorage(){
    localStorage.setItem("files", JSON.stringify(files));
}

function renderFiles(){
    const list = document.getElementById("fileList");
    list.innerHTML = "";

    for(let name in files){

        const div = document.createElement("div");
        div.className = "file";
        div.innerHTML = "📄 " + name;

        div.onclick = () => {
            currentFile = name;

            document.getElementById("editor").value =
            files[name];

            document.getElementById("currentName")
            .innerText = name;
        };

        list.appendChild(div);
    }
}

function newFile(){

    let name = prompt(
        "اسم الملف",
        "index.html"
    );

    if(!name) return;

    files[name] = "";

    currentFile = name;

    renderFiles();

    document.getElementById("editor").value = "";

    document.getElementById("currentName")
    .innerText = name;

    saveStorage();
}

function saveFile(){

    if(!currentFile){
        alert("افتح ملف");
        return;
    }

    files[currentFile] =
    document.getElementById("editor").value;

    saveStorage();

    alert("تم الحفظ");
}

function deleteFile(){

    if(!currentFile) return;

    delete files[currentFile];

    saveStorage();

    currentFile = null;

    document.getElementById("editor").value = "";

    document.getElementById("currentName")
    .innerText = "لا يوجد ملف";

    renderFiles();
}

function downloadFile(){

    if(!currentFile) return;

    const blob = new Blob(
        [document.getElementById("editor").value],
        {type:"text/plain"}
    );

    const a = document.createElement("a");

    a.href = URL.createObjectURL(blob);

    a.download = currentFile;

    a.click();
}

renderFiles();
</script>

</body>
</html>
